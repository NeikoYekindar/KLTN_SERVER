version: '3.8'

services:
  # ===== MQTT Broker =====
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt_broker
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket (optional, cho debug)
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  # ===== Forecast Server =====
  forecast_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forecast_server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app/server
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - API_PORT=5000
    depends_on:
      - mosquitto
    command: >
      python server/server.py
        --broker mosquitto
        --mqtt-port 1883
        --tcn models/tcn_model.pth
        --arima models/arima_model.pkl
        --inference-script server/inference.py
        --ensemble_json models/ensemble_stacking_metrics.json
        --api-port 5000
    restart: unless-stopped

