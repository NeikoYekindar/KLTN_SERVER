version: '3.8'

# ============================================================
# Weather Forecast System  —  AWS EFS Edition
# ============================================================
# 3 services:
#   mosquitto   — MQTT broker
#   worker      — MQTT subscriber + dual TCN inference + ghi EFS
#   api         — Flask API đọc local data + sao lưu EFS
#

# Models cần có trong ./models/:
#   tcn_model.pth               — TCN Model 1 (easy targets)
#   tcn_hard_model.pth          — TCN Hard Model (wind_dir, precip, cloud)
#   condition_classifier.pkl    — Condition classifier
#   rain_prob_classifier.pkl    — Rain probability classifier (0/45/100%)
# Yêu cầu host EC2: EFS đã mount tại /mnt/efs/fs1
#   sudo mount -t nfs4 <efs-id>.efs.<region>.amazonaws.com:/ /mnt/efs/fs1
#
# Cách dùng:
#   docker compose up -d --build
# ============================================================

services:

  # ===== MQTT Broker =====
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt_broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  # ===== Inference Worker =====
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: inference_worker
    depends_on:
      - mosquitto
    ports:
      - "8080:8080"                        # health check endpoint
    volumes:
      - ./server:/app/server               # code
      - ./models:/app/models               # model .pth files
      - /mnt/efs/fs1:/mnt/efs/fs1          # EFS shared storage
    environment:
      - EFS_BASE=/mnt/efs/fs1
      - HEALTH_PORT=8080
    command: >
      python server/worker.py
        --broker               mosquitto
        --mqtt-port            1883
        --topic                weather/data
        --tcn                  models/tcn_model.pth
        --tcn_hard             models/tcn_hard_model.pth
        --classifier           models/condition_classifier.pkl
        --rain_prob_classifier models/rain_prob_classifier.pkl
        --inference-script     server/inference_dual_tcn.py
    restart: unless-stopped

  # ===== Flask API Server =====
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: forecast_api
    ports:
      - "5000:5000"
    volumes:
      - /mnt/efs/fs1:/mnt/efs/fs1          # EFS shared storage
    environment:
      - EFS_BASE=/mnt/efs/fs1
      - GCS_REFRESH_INTERVAL=${GCS_REFRESH_INTERVAL:-60}
      - API_PORT=5000
      - API_HOST=0.0.0.0
    restart: unless-stopped
