version: '3.8'

# ============================================================
# Weather Forecast System  —  GCS Edition
# ============================================================
# 3 services:
#   mosquitto   — MQTT broker
#   worker      — MQTT subscriber + dual TCN inference + GCS upload
#   api         — Flask API đọc từ GCS (không cần PyTorch)
#
# Cách dùng:
#   cp .env.example .env         # điền GCS_BUCKET
#   cp /path/to/gcp-key.json secrets/gcp-key.json
#   docker compose up -d --build
# ============================================================

services:

  # ===== MQTT Broker =====
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt_broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  # ===== Inference Worker =====
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: inference_worker
    depends_on:
      - mosquitto
    volumes:
      - ./server:/app/server          # code (hot-reload friendly)
      - ./models:/app/models          # model .pth files
      - ./data:/app/data              # local data storage
      - ./secrets:/app/secrets:ro     # GCP service account key
    environment:
      - GCS_BUCKET=${GCS_BUCKET}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcp-key.json
    command: >
      python server/worker.py
        --broker     mosquitto
        --mqtt-port  1883
        --topic      weather/data
        --tcn        models/tcn_model.pth
        --tcn_hard   models/tcn_hard_model.pth
        --classifier models/condition_classifier.pkl
        --inference-script server/inference_dual_tcn.py
    restart: unless-stopped

  # ===== Flask API Server =====
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: forecast_api
    ports:
      - "5000:5000"
    volumes:
      - ./secrets:/app/secrets:ro     # GCP service account key
    environment:
      - GCS_BUCKET=${GCS_BUCKET}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gcp-key.json
      - GCS_REFRESH_INTERVAL=${GCS_REFRESH_INTERVAL:-300}
      - API_PORT=5000
      - API_HOST=0.0.0.0
    restart: unless-stopped
